fuse:
  allow_other: true

log:
  level: debug
  format: text
  file: tmp/pfs/pfs.log

mounts:
  media:
    mountpoint: /mnt/pfs/media
    storage_paths:
      - id: ssd1
        path: /mnt/ssd1/media
        min_free_gb: 0.1
        indexed: false
      - id: ssd2
        path: /mnt/ssd2/media
        min_free_gb: 0.1
        indexed: false
      - id: hdd1
        path: /mnt/hdd1/media
        min_free_gb: 0.2
        indexed: true
      - id: hdd2
        path: /mnt/hdd2/media
        min_free_gb: 0.2
        indexed: true
      - id: hdd3
        path: /mnt/hdd3/media
        min_free_gb: 0.2
        indexed: true
    storage_groups:
      ssds: [ssd1, ssd2]
      hdds: [hdd1, hdd2, hdd3]
    routing_rules:
      - match: 'downloads/**'
        targets: [ssd2]

      - match: 'library/music/**'
        targets: [ssd1]

      - match: '**'
        read_targets: [ssds, hdds]
        write_targets: [ssd2]
        write_policy: first_found
        path_preserving: true
    indexer:
      ignore:
        - '.DS_Store'
