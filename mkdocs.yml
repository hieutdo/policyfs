site_name: PolicyFS
site_description: PolicyFS Documentation
site_url: https://docs.policyfs.org/v1/
repo_url: https://github.com/hieutdo/policyfs
repo_name: hieutdo/policyfs

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11.12.3/dist/mermaid.min.js
  - javascripts/mermaid.js

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.highlight

nav:
  - Overview: index.md
  - Install:
      - Debian/Ubuntu: install/debian.md
  - Concepts: concepts.md
  - Use cases: use-cases.md
  - Configure: config.md
  - Systemd: systemd.md
  - Commands:
      - CLI overview: cli.md
      - mount: commands/mount.md
      - unmount: commands/unmount.md
      - index: commands/index.md
      - move: commands/move.md
      - prune: commands/prune.md
      - maint: commands/maint.md
      - doctor: commands/doctor.md
      - version: commands/version.md
  - Troubleshooting: troubleshooting.md
