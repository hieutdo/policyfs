name: publish-apt-repo

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  apt-secret-precheck:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.precheck.outputs.has_secret }}
    steps:
      - name: precheck
        id: precheck
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
        run: |
          if [[ -n "${APT_REPO_GPG_PRIVATE_KEY}" ]]; then
            echo "has_secret=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "has_secret=false" >> "${GITHUB_OUTPUT}"

  build-and-publish:
    if: ${{ needs.apt-secret-precheck.outputs.has_secret == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - apt-secret-precheck
    steps:
      - name: validate inputs
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ -z "${TAG}" ]]; then
            echo "pfs: error: missing required input tag" >&2
            exit 1
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "pfs: error: input tag must start with 'v' (e.g. v1.2.3)" >&2
            exit 1
          fi

      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            dpkg-dev \
            libsqlite3-dev \
            aptly \
            gnupg

      - name: unit tests
        run: go test ./...

      - name: build linux/amd64
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          mkdir -p bin
          COMMIT_SHORT="$(git rev-parse --short=7 HEAD)"
          LDFLAGS="-X github.com/hieutdo/policyfs/internal/cli.Version=${VERSION} -X github.com/hieutdo/policyfs/internal/cli.Commit=${COMMIT_SHORT} -X github.com/hieutdo/policyfs/internal/cli.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -ldflags "${LDFLAGS}" -o bin/pfs ./cmd/pfs

      - name: package deb
        env:
          VERSION: ${{ inputs.tag }}
          ARCH: amd64
        run: |
          bash scripts/package_deb.sh

      - name: normalize deb filename
        run: |
          deb_path=""
          shopt -s nullglob
          for p in dist/*_amd64.deb; do
            if [[ "${p}" == "dist/policyfs_amd64.deb" ]]; then
              continue
            fi
            deb_path="${p}"
            break
          done
          shopt -u nullglob

          if [[ -z "${deb_path}" ]]; then
            echo "pfs: error: deb not found in dist/" >&2
            exit 1
          fi

          cp "${deb_path}" "dist/policyfs_amd64.deb"
          if [[ -f "${deb_path}.sha256" ]]; then
            cp "${deb_path}.sha256" "dist/policyfs_amd64.deb.sha256"
          else
            sha256sum "dist/policyfs_amd64.deb" > "dist/policyfs_amd64.deb.sha256"
          fi

      - name: import apt repo signing key
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
        run: |
          if [[ -z "${APT_REPO_GPG_PRIVATE_KEY}" ]]; then
            echo "pfs: error: missing secret APT_REPO_GPG_PRIVATE_KEY" >&2
            exit 1
          fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "${APT_REPO_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: build apt repo
        run: |
          deb_path="dist/policyfs_amd64.deb"
          if [[ ! -f "${deb_path}" ]]; then
            echo "pfs: error: deb not found in dist/" >&2
            exit 1
          fi

          key_fpr="$(gpg --list-secret-keys --with-colons | awk -F: '$1=="fpr"{print $10; exit}')"
          if [[ -z "${key_fpr}" ]]; then
            echo "pfs: error: gpg key fingerprint not found" >&2
            exit 1
          fi

          rm -rf public
          mkdir -p public

          gpg --batch --yes --output public/policyfs.gpg --export "${key_fpr}"

          rm -rf ~/.aptly

          aptly repo create -distribution=stable -component=main policyfs
          aptly repo add policyfs "${deb_path}"

          aptly publish repo \
            -architectures=amd64 \
            -distribution=stable \
            -component=main \
            -gpg-key="${key_fpr}" \
            policyfs

          cp -r ~/.aptly/public/. public/

      - name: deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_jekyll: false
          publish_branch: gh-pages
          publish_dir: public
          cname: repo.policyfs.org
          destination_dir: apt
          keep_files: true
          force_orphan: false
