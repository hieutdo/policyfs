name: coverage

on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'migrations/**'
      - 'configs/**'
      - 'scripts/**'
      - 'Dockerfile*'
      - 'docker-compose*.yaml'
      - 'Makefile'
      - '.github/workflows/coverage.yml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'migrations/**'
      - 'configs/**'
      - 'scripts/**'
      - 'Dockerfile*'
      - 'docker-compose*.yaml'
      - 'Makefile'
      - '.github/workflows/coverage.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare FUSE
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3
          sudo modprobe fuse || true
          ls -l /dev/fuse

      - name: dev up
        run: |
          docker compose -f docker-compose.dev.yaml up -d --build dev

      - name: coverage (unit + integration)
        run: |
          docker compose -f docker-compose.dev.yaml exec -T -e GOFLAGS=-buildvcs=false dev bash /workspace/scripts/coverage.sh

      - name: dev down
        if: ${{ always() }}
        run: |
          docker compose -f docker-compose.dev.yaml down -v

      - name: upload to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/coverage.out
          flags: full
          fail_ci_if_error: false
