name: coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libsqlite3-dev

      - name: unit tests (coverage)
        run: |
          go test -count=1 -covermode=atomic -coverpkg=./cmd/...,./internal/... -coverprofile=coverage.out ./cmd/... ./internal/...

      - name: upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false
