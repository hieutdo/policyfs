name: docs-build

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'docsroot/**'
      - 'mkdocs.yml'
      - 'scripts/build_docs.sh'
      - 'docs/requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install
        run: pip install -r docs/requirements.txt

      - name: build
        run: bash scripts/build_docs.sh
